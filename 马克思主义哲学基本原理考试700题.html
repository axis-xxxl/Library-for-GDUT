// ---------- 应用状态 ----------
let currentIndex = 0;
const total = RAW_QUESTIONS.length;
// 存储每道题的选中选项索引 (-1 表示未选)
let selected = new Array(total).fill(-1);
// 存储每道题是否已经显示过正确答案（用于标记样式）
let revealed = new Array(total).fill(false);
// 存储错题索引
let wrongQuestions = new Set();
// 错题模式状态
let isWrongMode = false;
let wrongList = [];

// DOM 引用
const qNumber = document.getElementById('qNumber');
const qType = document.getElementById('qType');
const questionTextEl = document.getElementById('questionText');
const optionsContainer = document.getElementById('optionsContainer');
const feedback = document.getElementById('feedback');
const feedbackText = document.getElementById('feedbackText');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const resetAllBtn = document.getElementById('resetAllBtn');
const wrongBookBtn = document.getElementById('wrongBookBtn');
const resetCurrentBtn = document.getElementById('resetCurrentBtn');
const progressFill = document.getElementById('progressFill');
const answeredCount = document.getElementById('answeredCount');
const correctCount = document.getElementById('correctCount');
const wrongModeBanner = document.getElementById('wrongModeBanner');
const wrongModeText = document.getElementById('wrongModeText');
const exitWrongModeBtn = document.getElementById('exitWrongModeBtn');

// ---------- 刷新错题列表 ----------
function refreshWrongList() {
    wrongQuestions.clear();
    for (let i = 0; i < total; i++) {
        if (selected[i] !== -1 && selected[i] !== RAW_QUESTIONS[i].answer) {
            wrongQuestions.add(i);
        }
    }
    wrongList = Array.from(wrongQuestions).sort((a, b) => a - b);
}

// ---------- 渲染当前题目 ----------
function renderQuestion() {
    const q = RAW_QUESTIONS[currentIndex];
    const idx = currentIndex;
    const sel = selected[idx];
    const isRevealed = revealed[idx];

    // 题号：错题模式显示错题序号
    if (isWrongMode && wrongList.length > 0) {
        const wrongPos = wrongList.indexOf(idx);
        qNumber.textContent = `📕 错题 ${wrongPos + 1} / ${wrongList.length}（总第 ${idx + 1} 题）`;
    } else {
        qNumber.textContent = `第 ${idx + 1} / ${total} 题`;
    }
    qType.textContent = '单选题';

    // 题目文本
    questionTextEl.textContent = q.q;

    // 构建选项
    let html = '';
    const labels = ['A', 'B', 'C', 'D'];
    q.options.forEach((opt, i) => {
        let classes = 'option';
        if (isRevealed) {
            classes += ' disabled-opt';
            if (i === q.answer) {
                classes += ' correct-reveal';
            } else if (i === sel && sel !== q.answer) {
                classes += ' wrong-reveal';
            } else if (i === sel && sel === q.answer) {
                classes += ' correct-reveal';
            }
        } else {
            if (i === sel) {
                classes += ' selected';
            }
        }
        html += `<div class="${classes}" data-optindex="${i}">
            <span class="marker">${labels[i]}</span>
            <span>${opt}</span>
        </div>`;
    });
    optionsContainer.innerHTML = html;

    // 事件绑定 (只有未揭示时才可点击)
    if (!isRevealed) {
        document.querySelectorAll('.option:not(.disabled-opt)').forEach(el => {
            el.addEventListener('click', (e) => {
                const optIdx = parseInt(el.dataset.optindex, 10);
                handleOptionClick(optIdx);
            });
        });
    }

    // 反馈区域
    if (isRevealed) {
        const correctLabel = labels[q.answer];
        const correctText = q.options[q.answer];
        feedbackText.innerHTML = `✅ 正确答案：<span class="correct-answer">${correctLabel}. ${correctText}</span>`;
        feedback.classList.add('show');
    } else {
        feedback.classList.remove('show');
    }

    // 按钮状态（错题模式下的上/下题按钮依然可用）
    if (isWrongMode && wrongList.length > 0) {
        const wrongPos = wrongList.indexOf(currentIndex);
        prevBtn.disabled = (wrongPos <= 0);
        // 如果是最后一题错题，下一题按钮禁用；否则可用
        nextBtn.disabled = (wrongPos >= wrongList.length - 1);
    } else {
        prevBtn.disabled = (currentIndex === 0);
        nextBtn.disabled = false;
    }

    // 更新进度
    const answered = selected.filter(v => v !== -1).length;
    progressFill.style.width = `${(answered / total) * 100}%`;

    // 统计
    const totalCorrect = selected.reduce((acc, val, i) => {
        if (val === -1) return acc;
        return acc + (val === RAW_QUESTIONS[i].answer ? 1 : 0);
    }, 0);
    answeredCount.textContent = `✅ ${answered}`;
    correctCount.textContent = `🎯 ${totalCorrect}`;

    // 更新错题本按钮文字
    refreshWrongList();
    wrongBookBtn.textContent = `📖 错题本 (${wrongList.length})`;

    // 更新错题模式横幅
    if (isWrongMode) {
        wrongModeBanner.classList.add('show');
        wrongModeText.textContent = `📕 错题模式 · 共 ${wrongList.length} 道错题`;
    } else {
        wrongModeBanner.classList.remove('show');
    }
}

// ---------- 处理选项点击 ----------
function handleOptionClick(optIndex) {
    const idx = currentIndex;
    if (revealed[idx]) return;
    selected[idx] = optIndex;
    revealed[idx] = true;
    refreshWrongList();
    renderQuestion();
}

// ---------- 切换题目 ----------
function goTo(index) {
    if (index < 0 || index >= total) return;
    currentIndex = index;
    renderQuestion();
}

// ---------- 错题模式下切换 ----------
function goWrongPrev() {
    if (!isWrongMode || wrongList.length === 0) return;
    const wrongPos = wrongList.indexOf(currentIndex);
    if (wrongPos > 0) {
        goTo(wrongList[wrongPos - 1]);
    }
}

function goWrongNext() {
    if (!isWrongMode || wrongList.length === 0) return;
    const wrongPos = wrongList.indexOf(currentIndex);
    if (wrongPos < wrongList.length - 1) {
        goTo(wrongList[wrongPos + 1]);
    }
}

function goNormalPrev() {
    goTo(currentIndex - 1);
}

function goNormalNext() {
    goTo(currentIndex + 1);
}

// ---------- 进入错题模式 ----------
function enterWrongMode() {
    refreshWrongList();
    if (wrongList.length === 0) {
        alert('🎉 太棒了！暂无错题！');
        return;
    }
    isWrongMode = true;
    // 跳转到第一道错题
    goTo(wrongList[0]);
}

// ---------- 退出错题模式 ----------
function exitWrongMode() {
    isWrongMode = false;
    renderQuestion();
}

// ---------- 重置当前题目 ----------
function resetCurrent() {
    const idx = currentIndex;
    selected[idx] = -1;
    revealed[idx] = false;
    refreshWrongList();
    renderQuestion();
}

// ---------- 重置所有 ----------
function resetAll() {
    if (!confirm('确定要重置所有答题进度吗？此操作不可撤销！')) return;
    selected.fill(-1);
    revealed.fill(false);
    wrongQuestions.clear();
    wrongList = [];
    isWrongMode = false;
    currentIndex = 0;
    renderQuestion();
}

// ---------- 事件绑定 ----------
prevBtn.addEventListener('click', () => {
    if (isWrongMode) {
        goWrongPrev();
    } else {
        goNormalPrev();
    }
});
nextBtn.addEventListener('click', () => {
    if (isWrongMode) {
        goWrongNext();
    } else {
        goNormalNext();
    }
});
resetAllBtn.addEventListener('click', resetAll);
wrongBookBtn.addEventListener('click', () => {
    if (isWrongMode) {
        // 已经在错题模式，再点就退出
        exitWrongMode();
    } else {
        enterWrongMode();
    }
});
resetCurrentBtn.addEventListener('click', resetCurrent);
exitWrongModeBtn.addEventListener('click', exitWrongMode);

// 键盘支持 (左右方向键)
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') {
        e.preventDefault();
        if (isWrongMode) {
            goWrongPrev();
        } else {
            goNormalPrev();
        }
    } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        if (isWrongMode) {
            goWrongNext();
        } else {
            goNormalNext();
        }
    }
});

// 初始渲染
renderQuestion();
})();
</script>
</body>
</html>
