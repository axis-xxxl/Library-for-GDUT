<!DOCTYPE html>
<html lang="zh-CN">
<head>

    * { margin: 0; padding: 0; box-sizing: border-box; }

      display: flex;

      padding: 30px 20px 60px;
    }
    .container {

      font-weight: 600;

      display: flex;

      border-bottom: 2px solid #e9edf4;
      padding-bottom: 20px;

    }
    h1 small {
      font-size: 16px;
      font-weight: 400;
      color: #64748b;
      margin-left: auto;
    }

      background: #e9edf4;
      height: 8px;
      border-radius: 12px;
      margin-bottom: 28px;

    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: #2d7aff;
      border-radius: 12px;
      transition: width 0.25s ease;
    }
    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .q-number {
      font-weight: 600;
      font-size: 18px;
      color: #0f172a;
      background: #f1f5f9;
      padding: 4px 16px;
      border-radius: 40px;
    }
    .q-type {
      background: #dbeafe;
      color: #1e4b8a;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
    }
    .question-text {
      font-size: 19px;
      line-height: 1.6;
      color: #0b1c33;
      margin: 12px 0 22px 0;
      padding: 6px 0;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }
    .option {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 17px;
      cursor: pointer;
      transition: all 0.12s ease;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #1e293b;
      user-select: none;
    }
    .option:hover:not(.disabled-opt) { background: #f1f5fe; border-color: #b3c9ff; }
    .option.disabled-opt { cursor: default; opacity: 0.85; }
    .option .marker {
      width: 28px; height: 28px; border-radius: 40px;
      background: #eef2f6;
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 600; color: #1e293b; flex-shrink: 0;
      transition: 0.1s;
    }
    .option.selected { border-color: #2d7aff; background: #edf3ff; }
    .option.correct-reveal { border-color: #16a34a; background: #e6f9ed; }
    .option.correct-reveal .marker { background: #16a34a; color: white; }
    .option.wrong-reveal { border-color: #dc2626; background: #fee9e9; }
    .option.wrong-reveal .marker { background: #dc2626; color: white; }
    .option.show-correct .marker { background: #16a34a; color: white; }
    .action-bar {
      display: flex; justify-content: space-between; flex-wrap: wrap;
      gap: 14px; margin-top: 8px; padding-top: 20px;
      border-top: 1px solid #e9edf4;
    }
    .btn {
      border: none; background: #eef2f6; padding: 12px 26px;
      border-radius: 40px; font-weight: 500; font-size: 16px;
      color: #1e293b; cursor: pointer; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-primary { background: #2d7aff; color: white; box-shadow: 0 4px 8px rgba(45,122,255,0.2); }
    .btn-primary:hover { background: #1a5fd9; transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.5; pointer-events: none; transform: none; }
    .btn-outline { background: transparent; border: 2px solid #d0d8e3; }
    .btn-outline:hover { background: #f1f5f9; border-color: #b0bfd0; }
    .btn-success { background: #16a34a; color: white; }
    .btn-success:hover { background: #0f863b; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-confirm { background: #8b5cf6; color: white; }
    .btn-confirm:hover { background: #7c3aed; }
    .stats { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; font-size: 15px; color: #334155; }
    .stats span { background: #f1f5f9; padding: 4px 14px; border-radius: 40px; }
    .footer-note {
      margin-top: 28px; text-align: center; font-size: 14px;
      color: #94a3b8; border-top: 1px solid #eef2f6; padding-top: 22px;
    }

      margin-top: 16px; padding: 14px 20px; background: #f8fafc;
      border-radius: 16px; border-left: 6px solid #94a3b8;
      font-size: 16px; display: none;

    .wrong-mode-banner {

    .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 20px; }

      flex-wrap: wrap; margin: 40px 0 20px;

      .action-bar { flex-direction: column; align-items: stretch; }
      .btn { justify-content: center; }

  </style>
</head>
<body>
<div class="container" id="app">
  <h1>📘 原理刷题 <small>马克思主义</small></h1>

  <!-- 题型选择界面 -->
  <div id="typeSelectView">
    <div class="type-selector">

      <div class="type-card" data-type="judge"><h3>⚖️ 判断</h3><p>100 题</p><span class="badge">综合</span></div>

  </div>

  <!-- 刷题界面 -->
  <div id="quizView" class="hide">

    <div class="question-header">

    <div class="options" id="optionsContainer"></div>

    <div class="confirm-row" id="confirmRow">
      <button class="btn btn-confirm" id="confirmMultiBtn">✅ 确定答案</button>
    </div>
    <div class="answer-feedback" id="feedback"><span id="feedbackText"></span></div>
    <div class="action-bar">
      <div class="stats">

        <span id="correctCount">🎯 0</span>

      <div style="display:flex; gap:10px; flex-wrap:wrap;">

        <button class="btn btn-primary" id="nextBtn">下一题 ▶</button>
        <button class="btn btn-outline" id="wrongBookBtn" style="background:#fef3c7; border-color:#f59e0b;">📖 错题本</button>
        <button class="btn btn-outline" id="resetCurrentBtn" style="background:#e0f2fe; border-color:#7dd3fc;">↺ 重做本题</button>
      </div>
    </div>
    <div class="footer-note">
      ✔ 点击选项后自动显示正确答案 · 进度自动保存
      <button class="btn btn-outline btn-sm" id="resetAllBtn" style="background:#fee2e2; border-color:#fca5a5; margin-left:16px; vertical-align:middle;">↺ 重置所有</button>
    </div>
  </div>
</div>

    function getQuestions() {
      if (currentType === 'single') return SINGLE_QS;
      if (currentType === 'multi') return MULTI_QS;
      return JUDGE_QS;
    }
    function getTotal() { return getQuestions().length; }

    function initState() {
      const total = getTotal();
      if (currentType === 'multi') {
        selected = new Array(total).fill(null);
      } else {
        selected = new Array(total).fill(-1);
      }
      revealed = new Array(total).fill(false);
      wrongQuestions.clear();
      wrongList = [];
      isWrongMode = false;
      currentIndex = 0;
    }

    function refreshWrongList() {
      wrongQuestions.clear();
      const qs = getQuestions();
      for (let i = 0; i < qs.length; i++) {
        const sel = selected[i];
        if (sel === undefined || sel === null || sel === -1) continue;
        if (currentType === 'multi') {
          if (Array.isArray(sel) && Array.isArray(qs[i].answer)) {
            const s1 = [...sel].sort(), s2 = [...qs[i].answer].sort();
            if (JSON.stringify(s1) !== JSON.stringify(s2)) wrongQuestions.add(i);
          } else if (sel !== qs[i].answer) wrongQuestions.add(i);
        } else {
          if (sel !== qs[i].answer) wrongQuestions.add(i);
        }
      }
      wrongList = Array.from(wrongQuestions).sort((a,b) => a-b);
    }

    function renderQuestion() {
      const qs = getQuestions();
      const total = qs.length;
      const idx = currentIndex;
      if (total === 0) return;
      const q = qs[idx];
      const sel = selected[idx];
      const isRevealed = revealed[idx];

      // 错题模式序号
      if (isWrongMode && wrongList.length > 0) {
        const pos = wrongList.indexOf(idx);
        qNumber.textContent = `📕 错题 ${pos+1} / ${wrongList.length}（总第 ${idx+1} 题）`;
      } else {
        qNumber.textContent = `第 ${idx+1} / ${total} 题`;
      }

      const typeMap = { single: '单选题', multi: '多选题', judge: '判断题' };
      qType.textContent = typeMap[currentType] || '单选题';
      questionText.textContent = q.q;

      // 构建选项
      let html = '';
      const labels = ['A','B','C','D','E','F'];
      q.options.forEach((opt, i) => {
        let classes = 'option';
        if (isRevealed) {
          classes += ' disabled-opt';
          let isCorrect = false;
          if (currentType === 'multi') {
            if (Array.isArray(q.answer)) {
              isCorrect = q.answer.includes(i);
            }
          } else {
            isCorrect = (i === q.answer);
          }
          if (isCorrect) {
            classes += ' correct-reveal';
          } else if (currentType === 'multi') {
            if (Array.isArray(sel) && sel.includes(i) && !q.answer.includes(i)) {
              classes += ' wrong-reveal';
            } else if (!Array.isArray(sel) && sel === i && sel !== q.answer) {
              classes += ' wrong-reveal';
            }
          } else {
            if (i === sel && sel !== q.answer) classes += ' wrong-reveal';
          }
        } else {
          if (currentType === 'multi') {
            if (Array.isArray(sel) && sel.includes(i)) classes += ' selected';
          } else {
            if (i === sel) classes += ' selected';
          }
        }
        html += `<div class="${classes}" data-optindex="${i}">
          <span class="marker">${labels[i]}</span>
          <span>${opt}</span>
        </div>`;
      });
      optionsContainer.innerHTML = html;

      // 多选确定按钮显示控制
      if (currentType === 'multi' && !isRevealed) {
        confirmRow.classList.remove('hide');
        // 检查是否有选中
        const hasSelected = Array.isArray(sel) && sel.length > 0;
        confirmMultiBtn.disabled = !hasSelected;
      } else {
        confirmRow.classList.add('hide');
      }

      // 事件绑定：选项点击（仅多选切换选中，不提交）
      if (!isRevealed) {
        document.querySelectorAll('.option:not(.disabled-opt)').forEach(el => {
          el.addEventListener('click', (e) => {
            if (currentType === 'multi') {
              // 多选切换
              const optIdx = parseInt(el.dataset.optindex, 10);
              if (!Array.isArray(selected[idx])) selected[idx] = [];
              const arr = selected[idx];
              const pos = arr.indexOf(optIdx);
              if (pos > -1) arr.splice(pos, 1);
              else arr.push(optIdx);
              renderQuestion(); // 重新渲染更新样式和按钮状态
            } else {
              // 单选/判断直接提交
              const optIdx = parseInt(el.dataset.optindex, 10);
              selected[idx] = optIdx;
              revealed[idx] = true;
              renderQuestion();
            }
          });
        });
      }

      // 反馈
      if (isRevealed) {
        let correctLabel = '';
        if (currentType === 'multi') {
          if (Array.isArray(q.answer)) {
            correctLabel = q.answer.map(i => labels[i]).join(', ');
          }
        } else {
          correctLabel = labels[q.answer];
        }
        const correctText = Array.isArray(q.answer) ? q.answer.map(i => q.options[i]).join('；') : q.options[q.answer];
        feedbackText.innerHTML = `✅ 正确答案：<span class="correct-answer">${correctLabel}. ${correctText}</span>`;
        feedback.classList.add('show');
      } else {
        feedback.classList.remove('show');
      }

      // 按钮状态
      if (isWrongMode && wrongList.length > 0) {
        const pos = wrongList.indexOf(idx);
        prevBtn.disabled = (pos <= 0);
        nextBtn.disabled = (pos >= wrongList.length - 1);
      } else {
        prevBtn.disabled = (idx === 0);
        nextBtn.disabled = false;
      }

      // 进度
      const answered = selected.filter(v => {
        if (currentType === 'multi') return v !== null && v !== undefined && v !== -1 && v.length > 0;
        return v !== -1;
      }).length;
      progressFill.style.width = `${(answered / total) * 100}%`;

      let totalCorrect = 0;
      for (let i = 0; i < qs.length; i++) {
        const s = selected[i];
        if (s === undefined || s === null || s === -1) continue;
        if (currentType === 'multi') {
          if (Array.isArray(s) && Array.isArray(qs[i].answer)) {
            const a1 = [...s].sort(), a2 = [...qs[i].answer].sort();
            if (JSON.stringify(a1) === JSON.stringify(a2)) totalCorrect++;
          }
        } else {
          if (s === qs[i].answer) totalCorrect++;
        }
      }
      answeredCount.textContent = `✅ ${answered}`;
      correctCount.textContent = `🎯 ${totalCorrect}`;

      refreshWrongList();
      wrongBookBtn.textContent = `📖 错题本 (${wrongList.length})`;

      if (isWrongMode) {
        wrongModeBanner.classList.add('show');
        wrongModeText.textContent = `📕 错题模式 · 共 ${wrongList.length} 道错题`;
      } else {
        wrongModeBanner.classList.remove('show');
      }
    }

    // 多选确定按钮
    confirmMultiBtn.addEventListener('click', () => {
      const idx = currentIndex;
      if (revealed[idx]) return;
      const sel = selected[idx];
      if (!Array.isArray(sel) || sel.length === 0) return;
      revealed[idx] = true;
      renderQuestion();
    });

    function switchType(type) {
      currentType = type;
      initState();
      currentIndex = 0;
      typeSelectView.classList.add('hide');
      quizView.classList.remove('hide');
      const labelMap = { single: '单选题', multi: '多选题', judge: '判断题' };
      currentTypeLabel.textContent = labelMap[type] || '单选题';
      renderQuestion();
    }

    function backToType() {
      typeSelectView.classList.remove('hide');
      quizView.classList.add('hide');
    }

    function goTo(index) {
      const total = getTotal();
      if (index < 0 || index >= total) return;
      currentIndex = index;
      renderQuestion();
    }

    function goPrev() {
      if (isWrongMode && wrongList.length > 0) {
        const pos = wrongList.indexOf(currentIndex);
        if (pos > 0) goTo(wrongList[pos-1]);
      } else {
        goTo(currentIndex - 1);
      }
    }

    function goNext() {
      if (isWrongMode && wrongList.length > 0) {
        const pos = wrongList.indexOf(currentIndex);
        if (pos < wrongList.length - 1) goTo(wrongList[pos+1]);
      } else {
        goTo(currentIndex + 1);
      }
    }

    function enterWrongMode() {
      refreshWrongList();
      if (wrongList.length === 0) { alert('🎉 太棒了！暂无错题！'); return; }
      isWrongMode = true;
      goTo(wrongList[0]);
    }

    function exitWrongMode() {
      isWrongMode = false;
      renderQuestion();
    }

    function resetCurrent() {
      const idx = currentIndex;
      if (currentType === 'multi') selected[idx] = null;
      else selected[idx] = -1;
      revealed[idx] = false;
      refreshWrongList();
      renderQuestion();
    }

    function resetAll() {
      if (!confirm('确定要重置所有答题进度吗？此操作不可撤销！')) return;
      initState();
      renderQuestion();
    }

    // 事件绑定
    document.querySelectorAll('.type-card').forEach(card => {
      card.addEventListener('click', () => {
        const type = card.dataset.type;
        switchType(type);
      });
    });

    backBtn.addEventListener('click', backToType);
    prevBtn.addEventListener('click', goPrev);
    nextBtn.addEventListener('click', goNext);
    wrongBookBtn.addEventListener('click', () => {
      if (isWrongMode) exitWrongMode();
      else enterWrongMode();
    });
    resetCurrentBtn.addEventListener('click', resetCurrent);
    resetAllBtn.addEventListener('click', resetAll);
    exitWrongModeBtn.addEventListener('click', exitWrongMode);

    document.addEventListener('keydown', (e) => {
      if (!quizView.classList.contains('hide')) {
        if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
        else if (e.key === 'ArrowRight') { e.preventDefault(); goNext(); }
      }
    });

    // 默认显示题型选择
    typeSelectView.classList.remove('hide');
    quizView.classList.add('hide');
  })();
</script>
</body>
</html>
